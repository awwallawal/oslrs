<!DOCTYPE html>
<!--
  Story 13-3 — Cloudflare CUSTOM 5xx ERROR PAGE for oyoskills.com.
  When the origin (the box) returns 5xx / 52x (down, timed out, or overloaded-to-failure),
  Cloudflare serves THIS page on oyoskills.com instead of a raw error. It carries the official
  branding and sends the visitor to the always-up email-first fallback so no intent is lost.

  Setup: host this at the Pages edge (it deploys with cloudflare-fallback/ → oslsr-fallback.pages.dev/5xx.html)
  and point Cloudflare → oyoskills.com zone → Custom Pages → "5xx Errors" at that URL. See the runbook.
  The ::CLOUDFLARE_ERROR_500S_BOX:: token below is REQUIRED by Cloudflare for a 5xx custom page.
  Assets are absolute https URLs (served from the UP Pages edge, never the down origin).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#9C1E23" />
<title>Oyo State Skills Registry — We're very busy</title>
<!-- Auto-forward to the always-up sign-up fallback (kept short; a visible button backs it up). -->
<meta http-equiv="refresh" content="3; url=https://oslsr-fallback.pages.dev/" />
<style>
  body { font-family: 'Segoe UI', system-ui, Arial, sans-serif; margin: 0; background: #F9FAFB; color: #1F2937; text-align: center; }
  .gov-bar { background: #861A1F; color: #fff; font-size: 11.5px; padding: 5px 10px; }
  header { background: #fff; padding: 18px; border-bottom: 3px solid #9C1E23; }
  header img { width: 210px; max-width: 80%; height: auto; }
  .wrap { max-width: 460px; margin: 0 auto; padding: 28px 18px; }
  h1 { font-size: 20px; margin: 8px 0; }
  p { font-size: 15px; line-height: 1.5; color: #374151; }
  a.btn { display: inline-block; margin-top: 18px; padding: 14px 22px; font-size: 16px; font-weight: 700; color: #fff; background: #9C1E23; border-radius: 10px; text-decoration: none; }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="gov-bar">🔒 Official Oyo State Government service</div>
  <header><img src="https://oslsr-fallback.pages.dev/oyo-state-logo.png" alt="Oyo State Government" /></header>
  <div class="wrap">
    <h1>We're very busy right now</h1>
    <p>A lot of people are signing up at once. We're taking you to a quick sign-up page so you don't lose your place — we'll email you a secure link to finish.</p>
    <a class="btn" href="https://oslsr-fallback.pages.dev/">Continue to quick sign-up →</a>
  </div>
  <!-- Required Cloudflare token for a 5xx custom page (hidden from view). -->
  <div class="hidden">::CLOUDFLARE_ERROR_500S_BOX::</div>
  <script>
    // Belt-and-braces redirect in case meta-refresh is slow; the button still works regardless.
    setTimeout(function () { window.location.href = 'https://oslsr-fallback.pages.dev/'; }, 2500);
  </script>
</body>
</html>
