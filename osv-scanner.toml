reason = "react-router 6.30.4 SSR-hydration constructor injection — N/A: client-side SPA, no SSR. Fix v7 only (crosses major, override-policy forbids; broke web build before). App-layer safe-redirect in place. Accepted-risk (2026-07-24)."

