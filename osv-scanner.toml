# osv-scanner ignore config — Story 13-31 (2026-07-16)
#
# Why this file exists
# --------------------
# npm retired the legacy audit endpoint (HTTP 410 Gone, 2026-07-15) that
# `pnpm audit` called; pnpm has no released version on the bulk advisory
# endpoint (broken across the 9.x + 10.x lines — pnpm/pnpm#11265). CI's
# `pnpm audit --audit-level=high --prod` gate therefore hard-failed every
# deploy. We replaced it with osv-scanner (reads pnpm-lock.yaml against the
# OSV database, no dependency on the retired endpoint) — see .github/workflows/ci-cd.yml.
#
# osv-scanner has no `--prod` equivalent: it scans the WHOLE lockfile, so it
# surfaces the dev/build/test-tooling subtree that the prior `--prod` gate
# correctly excluded (and that Story 9-54's structural fixes already assessed).
# Every entry below was verified NOT to be in the production dependency tree
# (`pnpm why -r --prod <pkg>` empty, 2026-07-16). Grandfathering them here
# reproduces the team's signed-off posture — no high/critical in *prod* deps —
# while keeping osv-scanner a HARD gate for any NEW vulnerability.
#
# ignoreUntil = 2026-08-15 forces re-triage in ~4 weeks (post-launch): each
# ignore expires and re-fails the build unless burned down or re-justified in
# Story 13-31's remediation pass (turbo 2.x major, xlsx→SheetJS CDN, dev-tree
# patch bumps). Fixed at adoption via bounded overrides: vite, form-data,
# follow-redirects (see package.json pnpm.overrides).

