# osv-scanner accepted-risk config — Story 13-32 (2026-07-18)
#
# What changed from Story 13-31
# -----------------------------
# 13-31 adopted osv-scanner (npm retired the legacy `pnpm audit` endpoint, 410
# Gone) but osv-scanner has no `--prod` mode: it scans the WHOLE pnpm-lock.yaml,
# surfacing the dev/build/test-tooling subtree the retired `pnpm audit --prod`
# gate correctly excluded. 13-31 grandfathered 17 such findings here with
# `ignoreUntil = 2026-08-15` — a deliberate forcing function that would re-fail
# CI on that date. 13-32 removes that expiry cliff at the ROOT CAUSE.
#
# The new two-tier CI gate (.github/workflows/ci-cd.yml)
# ------------------------------------------------------
#   1. BLOCKING gate — PRODUCTION scope only. Reproduces the retired
#      `pnpm audit --prod` posture: osv-scanner scans the full lockfile, then
#      apps/api/scripts/osv-prod-gate.ts keeps ONLY findings whose package is in
#      pnpm's production dependency closure (`pnpm ls -r --prod --depth Infinity
#      --json`) and fails the build iff a PROD dependency is vulnerable. This
#      config file is NOT consulted by the blocking gate — the prod scope makes
#      the entire dev-tree class evaporate from the deploy-blocking surface, so
#      no per-CVE ignore is needed to keep it green.
#   2. REPORT-ONLY tier — full lockfile, NON-BLOCKING. osv-scanner scans the
#      whole tree with `--config=osv-scanner.toml` → SARIF → GitHub Security
#      tab. This preserves dev-tree visibility (a compromised build tool is a
#      real supply-chain signal) WITHOUT blocking deploys. The entries below
#      filter the handful of PERMANENTLY-accepted dev-only risks out of that
#      report so it stays actionable (any NEW dev-tree vuln still surfaces).
#
# Why these three remain (13-32 remediation, 2026-07-16 → 2026-07-18)
# -------------------------------------------------------------------
# 11 of the 13-31 findings were fixed at source and their ignore lines DELETED:
#   * turbo 1.13 → 2.10.5 (major bump via @turbo/codemod) — kills the 9.8 Critical.
#   * bounded overrides (>=fixed <nextMajor, per package.json override-policy):
#     flatted, postcss, esbuild, js-yaml, markdown-it, linkify-it, ajv, @babel/core.
# The THREE below have NO in-policy fix (their patch crosses a major, which the
# repo override-policy forbids — the 9-54 footgun — or no npm fix exists). All
# three are dev-only (`pnpm why -r --prod <pkg>` empty, re-verified 2026-07-18)
# and OUT of the blocking prod-scope gate entirely. They are converted from an
# EXPIRING grandfather to a PERMANENT (no `ignoreUntil`) accepted-risk, mirroring
# package.json pnpm.comments.accepted-risks. AC4: zero expiring entries remain.

# --- xlsx (SheetJS) — no npm fix published -------------------------------------
# devDependency; the only consumer, apps/api/src/services/xlsform-parser.service.ts
# (admin one-time XLSForm import, Story 2-9), dynamically imports it and returns
# 503 under a `--prod` install where xlsx is absent. Removal was assessed in
# 13-32 and rejected: it would force `parseXlsxFile` async (exceljs.load is async)
# across the runtime feature path + ~40 synchronous test call sites — a large
# churn to a live feature for zero prod-gate benefit (xlsx is already out of prod
# scope). Permanent accepted-risk.
[[IgnoredVulns]]
id = "GHSA-4r6h-8v6p-xvw6"
reason = "xlsx 0.18.5 (7.8, prototype pollution) — SheetJS dev-only (admin XLSForm import; 503 under --prod). No npm fix published. Not in --prod tree. Permanent accepted-risk (13-32)."

[[IgnoredVulns]]
id = "GHSA-5pgg-2g8v-p4x9"
reason = "xlsx 0.18.5 (7.5, ReDoS) — same SheetJS dev-only dep; no npm fix. Not in --prod tree. Permanent accepted-risk (13-32)."

