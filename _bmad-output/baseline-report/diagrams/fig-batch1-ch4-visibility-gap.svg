<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <rect width="760" height="540" fill="#fbf9f2"/>
  <text x="380" y="22" font-family='"Inter", sans-serif' font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1a1a1a">The Visibility Gap, Why the Register Matters</text>
  <rect x="60" y="80" width="640" height="100" fill="#d6ebee" stroke="#2f6b6f" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="80" y="100" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="start" dominant-baseline="hanging" fill="#2f6b6f">FORMAL ECONOMY  (~10%)</text>
  <text x="80" y="130" font-family='"Inter", sans-serif' font-size="12" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">Registered businesses, tax-paying enterprises,</text>
  <text x="80" y="150" font-family='"Inter", sans-serif' font-size="12" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">formal employees</text>
  <text x="680" y="130" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="end" dominant-baseline="hanging" fill="#2f6b6f">VISIBLE</text>
  <text x="680" y="150" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="end" dominant-baseline="hanging" fill="#6b6b6b">to government</text>
  <line x1="60" y1="200" x2="700" y2="200" stroke="#9C1E23" stroke-width="2.5" stroke-dasharray="4,3"/>
  <rect x="300" y="188" width="160" height="24" fill="#fbf9f2" stroke="#9C1E23" stroke-width="1.5" rx="12" ry="12" opacity="1"/>
  <text x="380" y="200" font-family='"Inter", sans-serif' font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="#9C1E23">VISIBILITY LINE</text>
  <rect x="60" y="230" width="640" height="220" fill="#ffe0e0" stroke="#c92a2a" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="80" y="250" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="start" dominant-baseline="hanging" fill="#c92a2a">INFORMAL ECONOMY  (~90%)</text>
  <text x="80" y="280" font-family='"Inter", sans-serif' font-size="12" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">Self-employed artisans, market traders, subsistence farmers,</text>
  <text x="80" y="300" font-family='"Inter", sans-serif' font-size="12" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">informal apprentices</text>
  <text x="680" y="280" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="end" dominant-baseline="hanging" fill="#c92a2a">INVISIBLE</text>
  <text x="680" y="300" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="end" dominant-baseline="hanging" fill="#6b6b6b">to planning systems</text>
  <text x="100" y="340" font-family='"Inter", sans-serif' font-size="12" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">▶ No registration data</text>
  <text x="100" y="362" font-family='"Inter", sans-serif' font-size="12" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">▶ No skills inventory</text>
  <text x="100" y="384" font-family='"Inter", sans-serif' font-size="12" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">▶ No geographic distribution</text>
  <text x="100" y="406" font-family='"Inter", sans-serif' font-size="12" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">▶ No contact mechanism for policy interventions</text>
  <rect x="60" y="470" width="640" height="50" fill="#f3e6e7" stroke="#9C1E23" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="380" y="487" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#9C1E23">THE OSLSR CLOSES THIS GAP</text>
  <text x="380" y="506" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#1a1a1a">A digital register of skilled workers across both formal and informal sectors</text>
</svg>
