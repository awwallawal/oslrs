<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="#fbf9f2"/>
  <text x="400" y="22" font-family='"Inter", sans-serif' font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1a1a1a">Marketplace Privacy Tier Architecture</text>
  <rect x="60" y="80" width="680" height="130" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="1.5" rx="8" ry="8" opacity="1"/>
  <rect x="80" y="96" width="80" height="28" fill="#2b8a3e" stroke="none" stroke-width="1.5" rx="14" ry="14" opacity="1"/>
  <text x="120" y="110" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="white">TIER 1</text>
  <text x="180" y="110" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="start" dominant-baseline="middle" fill="#2b8a3e">Registry Only (Default)</text>
  <text x="100" y="144" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Respondent data stored in secure registry</text>
  <text x="100" y="164" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Accessible only to authorised staff</text>
  <text x="100" y="184" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Not visible on public marketplace</text>
  <rect x="60" y="225" width="680" height="130" fill="#fff5e6" stroke="#b58105" stroke-width="1.5" rx="8" ry="8" opacity="1"/>
  <rect x="80" y="241" width="80" height="28" fill="#b58105" stroke="none" stroke-width="1.5" rx="14" ry="14" opacity="1"/>
  <text x="120" y="255" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="white">TIER 2</text>
  <text x="180" y="255" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="start" dominant-baseline="middle" fill="#b58105">Anonymous Marketplace (Q6.1 = Yes)</text>
  <text x="100" y="289" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Skills, LGA, and experience-level visible</text>
  <text x="100" y="309" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Name and contact details hidden</text>
  <text x="100" y="329" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Employers can see capability but not identity</text>
  <rect x="60" y="370" width="680" height="130" fill="#f3e6e7" stroke="#9C1E23" stroke-width="1.5" rx="8" ry="8" opacity="1"/>
  <rect x="80" y="386" width="80" height="28" fill="#9C1E23" stroke="none" stroke-width="1.5" rx="14" ry="14" opacity="1"/>
  <text x="120" y="400" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="white">TIER 3</text>
  <text x="180" y="400" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="start" dominant-baseline="middle" fill="#9C1E23">Identifiable Contact (Q6.2 = Yes)</text>
  <text x="100" y="434" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Name and phone-number visible to employers</text>
  <text x="100" y="454" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Professional bio and portfolio link displayed</text>
  <text x="100" y="474" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Contact reveal protected by hCaptcha + rate limiting</text>
</svg>
