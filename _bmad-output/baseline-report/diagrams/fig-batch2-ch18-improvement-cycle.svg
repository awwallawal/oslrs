<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" preserveAspectRatio="xMidYMid meet">
  <defs><marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/></marker></defs>
  <rect width="720" height="540" fill="#fbf9f2"/>
  <text x="360" y="22" font-family='"Inter", sans-serif' font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1a1a1a">Continuous Improvement Cycle (PDCA)</text>
  <rect x="290" y="95" width="140" height="70" fill="white" stroke="#9C1E23" stroke-width="2" rx="8" ry="8" opacity="1"/>
  <text x="360" y="124" font-family='"Inter", sans-serif' font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#9C1E23">PLAN</text>
  <text x="360" y="146" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Define KPIs, set targets</text>
  <rect x="450" y="255" width="140" height="70" fill="white" stroke="#1864ab" stroke-width="2" rx="8" ry="8" opacity="1"/>
  <text x="520" y="284" font-family='"Inter", sans-serif' font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1864ab">DO</text>
  <text x="520" y="306" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Execute fieldwork</text>
  <rect x="290" y="415" width="140" height="70" fill="white" stroke="#b58105" stroke-width="2" rx="8" ry="8" opacity="1"/>
  <text x="360" y="444" font-family='"Inter", sans-serif' font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#b58105">CHECK</text>
  <text x="360" y="466" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Review against KPIs</text>
  <rect x="130" y="255" width="140" height="70" fill="white" stroke="#2b8a3e" stroke-width="2" rx="8" ry="8" opacity="1"/>
  <text x="200" y="284" font-family='"Inter", sans-serif' font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#2b8a3e">ACT</text>
  <text x="200" y="306" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Recalibrate, improve</text>
  <path d="M 360.0 130.0 Q 508.5 141.5 520.0 290.0" fill="none" stroke="#6b6b6b" stroke-width="2" marker-end="url(#arrowhead)" color="#6b6b6b"/>
  <path d="M 520.0 290.0 Q 508.5 438.5 360.0 450.0" fill="none" stroke="#6b6b6b" stroke-width="2" marker-end="url(#arrowhead)" color="#6b6b6b"/>
  <path d="M 360.0 450.0 Q 211.5 438.5 200.0 290.0" fill="none" stroke="#6b6b6b" stroke-width="2" marker-end="url(#arrowhead)" color="#6b6b6b"/>
  <path d="M 200.0 290.0 Q 508.5 438.5 360.0 130.0" fill="none" stroke="#6b6b6b" stroke-width="2" marker-end="url(#arrowhead)" color="#6b6b6b"/>
  <text x="360" y="284" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#9C1E23">OSLSR</text>
  <text x="360" y="304" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">M&amp;E Loop</text>
</svg>
