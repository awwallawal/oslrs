<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" preserveAspectRatio="xMidYMid meet">
  <defs><marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/></marker></defs>
  <rect width="820" height="580" fill="#fbf9f2"/>
  <text x="410" y="22" font-family='"Inter", sans-serif' font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1a1a1a">OSLSR User-Role Hierarchy</text>
  <text x="410" y="44" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Five operational roles + Public tier</text>
  <rect x="330" y="80" width="160" height="60" fill="#f3e6e7" stroke="#9C1E23" stroke-width="2" rx="6" ry="6" opacity="1"/>
  <text x="410" y="100" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#9C1E23">SUPER ADMIN</text>
  <text x="410" y="122" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Full system control + audit</text>
  <line x1="410" y1="140" x2="200" y2="200" stroke="#6b6b6b" stroke-width="1.5" marker-end="url(#arrowhead)" color="#6b6b6b"/>
  <line x1="410" y1="140" x2="620" y2="200" stroke="#6b6b6b" stroke-width="1.5" marker-end="url(#arrowhead)" color="#6b6b6b"/>
  <rect x="120" y="200" width="160" height="60" fill="#d0ebff" stroke="#1864ab" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="200" y="220" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1864ab">SUPERVISOR</text>
  <text x="200" y="240" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Field oversight, QA review</text>
  <rect x="540" y="200" width="160" height="60" fill="#d0ebff" stroke="#1864ab" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="620" y="220" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1864ab">ASSESSOR</text>
  <text x="620" y="240" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Verification, validation</text>
  <line x1="200" y1="260" x2="200" y2="320" stroke="#6b6b6b" stroke-width="1.5" marker-end="url(#arrowhead)" color="#6b6b6b"/>
  <line x1="620" y1="260" x2="620" y2="320" stroke="#6b6b6b" stroke-width="1.5" marker-end="url(#arrowhead)" color="#6b6b6b"/>
  <rect x="120" y="320" width="160" height="60" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="200" y="340" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#2b8a3e">ENUMERATOR</text>
  <text x="200" y="360" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Field data collection</text>
  <rect x="540" y="320" width="160" height="60" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="620" y="340" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#2b8a3e">CLERK</text>
  <text x="620" y="360" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Data entry + QA</text>
  <rect x="310" y="460" width="200" height="70" fill="#f4f2ed" stroke="#6b6b6b" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="410" y="480" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">PUBLIC TIER</text>
  <text x="410" y="502" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Self-registration • Marketplace browse</text>
  <line x1="410" y1="380" x2="410" y2="460" stroke="#6b6b6b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="420" y="420" font-family='"Inter", sans-serif' font-size="9" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#6b6b6b">unauthenticated public</text>
