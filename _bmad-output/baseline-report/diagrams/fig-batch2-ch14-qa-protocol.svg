<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" preserveAspectRatio="xMidYMid meet">
  <defs><marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/></marker></defs>
  <rect width="820" height="600" fill="#fbf9f2"/>
  <text x="410" y="22" font-family='"Inter", sans-serif' font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1a1a1a">Four-Layer Data Quality Assurance Protocol</text>
  <rect x="60" y="75" width="700" height="110" fill="#d0ebff" stroke="#1864ab" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <rect x="72" y="87" width="96" height="24" fill="#1864ab" stroke="none" stroke-width="1.5" rx="12" ry="12" opacity="1"/>
  <text x="120" y="99" font-family='"Inter", sans-serif' font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="white">LAYER 1</text>
  <text x="180" y="99" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="start" dominant-baseline="middle" fill="#1864ab">POINT-OF-ENTRY VALIDATION</text>
  <text x="180" y="117" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="start" dominant-baseline="middle" fill="#6b6b6b">Real-time validation at submission</text>
  <text x="72" y="135" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Required-field enforcement</text>
  <text x="72" y="150.225" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Format validation (NIN modulus 11, phone, email)</text>
  <text x="72" y="165.45" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Range checks (age 15+, dates)</text>
  <text x="72" y="180.675" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Skip-logic verification</text>
  <rect x="60" y="200" width="700" height="110" fill="#fff5e6" stroke="#b58105" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <rect x="72" y="212" width="96" height="24" fill="#b58105" stroke="none" stroke-width="1.5" rx="12" ry="12" opacity="1"/>
  <text x="120" y="224" font-family='"Inter", sans-serif' font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="white">LAYER 2</text>
  <text x="180" y="224" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="start" dominant-baseline="middle" fill="#b58105">AUTOMATED FRAUD DETECTION</text>
  <text x="180" y="242" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="start" dominant-baseline="middle" fill="#6b6b6b">Flagging via Fraud Signal Engine</text>
  <text x="72" y="260" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• GPS cluster analysis</text>
  <text x="72" y="275.225" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Speed-run detection (anomalously fast submissions)</text>
  <text x="72" y="290.45" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Response-pattern analysis</text>
  <text x="72" y="305.675" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• NIN dedup constraint</text>
  <rect x="60" y="325" width="700" height="110" fill="#f3e6e7" stroke="#9C1E23" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <rect x="72" y="337" width="96" height="24" fill="#9C1E23" stroke="none" stroke-width="1.5" rx="12" ry="12" opacity="1"/>
  <text x="120" y="349" font-family='"Inter", sans-serif' font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="white">LAYER 3</text>
  <text x="180" y="349" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="start" dominant-baseline="middle" fill="#9C1E23">SUPERVISORY REVIEW</text>
  <text x="180" y="367" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="start" dominant-baseline="middle" fill="#6b6b6b">Daily review by Field Supervisors</text>
  <text x="72" y="385" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Review flagged submissions</text>
  <text x="72" y="400.225" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Spot-check 10% of clean submissions</text>
  <text x="72" y="415.45" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Field accompaniment to disputed cases</text>
  <text x="72" y="430.675" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Quality coaching to enumerators</text>
  <rect x="60" y="450" width="700" height="110" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <rect x="72" y="462" width="96" height="24" fill="#2b8a3e" stroke="none" stroke-width="1.5" rx="12" ry="12" opacity="1"/>
  <text x="120" y="474" font-family='"Inter", sans-serif' font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" fill="white">LAYER 4</text>
  <text x="180" y="474" font-family='"Inter", sans-serif' font-size="12" font-weight="700" text-anchor="start" dominant-baseline="middle" fill="#2b8a3e">ASSESSOR VERIFICATION</text>
  <text x="180" y="492" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="start" dominant-baseline="middle" fill="#6b6b6b">Independent post-field verification</text>
  <text x="72" y="510" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Random 5% sample re-contact</text>
  <text x="72" y="525.225" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• NIN cross-check with NIMS</text>
  <text x="72" y="540.45" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Skills-claim verification (where applicable)</text>
  <text x="72" y="555.675" font-family='"Inter", sans-serif' font-size="10.5" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Final data quality certification</text>
</svg>
