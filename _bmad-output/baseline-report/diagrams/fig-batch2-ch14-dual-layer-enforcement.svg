<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" preserveAspectRatio="xMidYMid meet">
  <defs><marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/></marker></defs>
  <rect width="820" height="380" fill="#fbf9f2"/>
  <text x="410" y="22" font-family='"Inter", sans-serif' font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1a1a1a">Dual-Layer Validation Enforcement, Client + Server</text>
  <rect x="60" y="80" width="340" height="220" fill="#d0ebff" stroke="#1864ab" stroke-width="1.5" rx="8" ry="8" opacity="1"/>
  <text x="230" y="100" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1864ab">CLIENT-SIDE (PWA)</text>
  <text x="80" y="130" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Real-time field validation</text>
  <text x="80" y="145.95" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Skip-logic enforcement</text>
  <text x="80" y="161.9" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Format checks (regex)</text>
  <text x="80" y="177.85" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• User-friendly error messaging</text>
  <text x="80" y="193.8" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• UX layer; not security boundary</text>
  <line x1="400" y1="190" x2="460" y2="190" stroke="#9C1E23" stroke-width="2" marker-end="url(#arrowhead)" color="#9C1E23"/>
  <text x="430" y="210" font-family='"Inter", sans-serif' font-size="10" font-weight="600" text-anchor="middle" dominant-baseline="hanging" fill="#9C1E23">submission</text>
  <rect x="460" y="80" width="320" height="220" fill="#f3e6e7" stroke="#9C1E23" stroke-width="1.5" rx="8" ry="8" opacity="1"/>
  <text x="620" y="100" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#9C1E23">SERVER-SIDE (API)</text>
  <text x="480" y="130" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Authoritative validation</text>
  <text x="480" y="145.95" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Modulus-11 NIN check</text>
  <text x="480" y="161.9" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• DB constraints (UNIQUE, FK)</text>
  <text x="480" y="177.85" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Rate limiting + auth middleware</text>
  <text x="480" y="193.8" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">• Security boundary; final word</text>
  <text x="410" y="340" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Server-side is authoritative. Client-side enhances UX but never substitutes for server validation.</text>
</svg>
