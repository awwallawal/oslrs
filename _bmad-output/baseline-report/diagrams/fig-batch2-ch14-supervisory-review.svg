<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" preserveAspectRatio="xMidYMid meet">
  <defs><marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/></marker></defs>
  <rect width="820" height="440" fill="#fbf9f2"/>
  <text x="410" y="22" font-family='"Inter", sans-serif' font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1a1a1a">Layer 3: Supervisory Review Workflow</text>
  <rect x="60" y="100" width="152.5" height="130" fill="white" stroke="#b58105" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="136.25" y="122" font-family='"Inter", sans-serif' font-size="9" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#b58105">STAGE 1</text>
  <text x="136.25" y="142" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#b58105">TRIGGER</text>
  <text x="74" y="168" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">Daily</text>
  <text x="74" y="183.95" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">flagged-submission</text>
  <text x="74" y="199.9" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">queue</text>
  <line x1="212.5" y1="165" x2="242.5" y2="165" stroke="#b58105" stroke-width="2" marker-end="url(#arrowhead)" color="#b58105"/>
  <rect x="242.5" y="100" width="152.5" height="130" fill="white" stroke="#1864ab" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="318.75" y="122" font-family='"Inter", sans-serif' font-size="9" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1864ab">STAGE 2</text>
  <text x="318.75" y="142" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#1864ab">REVIEW</text>
  <text x="256.5" y="168" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">Supervisor inspects</text>
  <text x="256.5" y="183.95" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">context (GPS, time,</text>
  <text x="256.5" y="199.9" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">pattern)</text>
  <line x1="395" y1="165" x2="425" y2="165" stroke="#1864ab" stroke-width="2" marker-end="url(#arrowhead)" color="#1864ab"/>
  <rect x="425" y="100" width="152.5" height="130" fill="white" stroke="#9C1E23" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="501.25" y="122" font-family='"Inter", sans-serif' font-size="9" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#9C1E23">STAGE 3</text>
  <text x="501.25" y="142" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#9C1E23">DECIDE</text>
  <text x="439" y="168" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">Approve /</text>
  <text x="439" y="183.95" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">Re-validate / Reject</text>
  <text x="439" y="199.9" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">with note</text>
  <line x1="577.5" y1="165" x2="607.5" y2="165" stroke="#9C1E23" stroke-width="2" marker-end="url(#arrowhead)" color="#9C1E23"/>
  <rect x="607.5" y="100" width="152.5" height="130" fill="white" stroke="#2b8a3e" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="683.75" y="122" font-family='"Inter", sans-serif' font-size="9" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#2b8a3e">STAGE 4</text>
  <text x="683.75" y="142" font-family='"Inter", sans-serif' font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#2b8a3e">COACH</text>
  <text x="621.5" y="168" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">Feedback to</text>
  <text x="621.5" y="183.95" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">enumerator if</text>
  <text x="621.5" y="199.9" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="start" dominant-baseline="hanging" fill="#1a1a1a">pattern recurs</text>
  <text x="410" y="290" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Coverage: Daily review of all flagged submissions, plus 10% spot-check of clean submissions.</text>
  <rect x="60" y="320" width="700" height="80" fill="#f3e6e7" stroke="#9C1E23" stroke-width="1.5" rx="6" ry="6" opacity="1"/>
  <text x="410" y="340" font-family='"Inter", sans-serif' font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="hanging" fill="#9C1E23">OUTCOME METRICS</text>
  <text x="410" y="365" font-family='"Inter", sans-serif' font-size="11" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#1a1a1a">Fraud-flag rate &lt; 3% • False-positive review rate &lt; 15%</text>
  <text x="410" y="385" font-family='"Inter", sans-serif' font-size="10" font-weight="400" text-anchor="middle" dominant-baseline="hanging" fill="#6b6b6b">Targets recalibrated quarterly via Assessor verification (Layer 4)</text>
</svg>
