name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Non-blocking during stabilization

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      REFRESH_TOKEN_SECRET: test-refresh-token-secret-for-ci
      PUBLIC_APP_URL: http://localhost:5173
      VITE_E2E: 'true'
      E2E: 'true'

    steps:
      - uses: actions/checkout@v5

      # SHA-pinned to a Node 24 commit on main — see ci-cd.yml for rationale.
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Push database schema
        run: pnpm --filter @oslsr/api db:push:force

      - name: Seed database
        run: pnpm --filter @oslsr/api db:seed:dev

      # Cache Playwright browsers to avoid ~90s install on every run.
      #
      # Pitfall #31 (2026-05-09): the cache key MUST track the resolved
      # Playwright version, not just `apps/web/package.json` text. With a
      # caret-pinned `^1.58.2`, the package.json hash stays stable across
      # 1.58.x → 1.59.x bumps, but Playwright's on-disk browser path includes
      # a revision number (e.g. `chromium_headless_shell-1208/`) that bumps
      # with the npm version. Restoring an older cached path means the test
      # runner fails at browser launch with "Executable doesn't exist".
      #
      # Two-part fix:
      #   1. Include `pnpm-lock.yaml` (resolved version) AND a manual `v2-`
      #      prefix in the key so the next bump invalidates the cache and any
      #      future ops can bust manually by incrementing.
      #   2. Tighten `restore-keys` to only match v2-or-later — the previous
      #      `playwright-${{ runner.os }}-` fallback restored the v1 broken
      #      cache, which is why fe878af + 096086e both failed identically.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-v2-${{ hashFiles('apps/web/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-v2-

      # Pitfall #31 (2026-05-09): use the project-pinned Playwright via
      # `pnpm --filter @oslsr/web exec playwright`, NOT `pnpm dlx playwright`.
      # `dlx` fetches a separate (latest) Playwright that may install a newer
      # browser revision than the project's locked version expects, so the
      # cached binaries silently disagree with the test-runner's expectations.
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @oslsr/web exec playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @oslsr/web exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        # SHA-pinned to a Node 24 commit on main — see ci-cd.yml for rationale.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

      - name: Upload test results
        if: ${{ !cancelled() }}
        # SHA-pinned to a Node 24 commit on main — see ci-cd.yml for rationale.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: e2e-test-results
          path: apps/web/test-results/
          retention-days: 30
