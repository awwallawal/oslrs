name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  # Suppress turbo's "Attention: telemetry" preamble that contaminates stdout
  # of `--dry-run=json` and breaks downstream `| jq '.packages | length'` checks
  # used by the per-package change-detection in test-api / test-web / test-unit jobs.
  # Story 9-15 (PR #1) was the first pull_request-event run on this repo and
  # exposed the latent bug; push-to-main events skip the conditional path
  # because [origin/main] filter matches itself = no diff = test skipped.
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # ============================================
  # Job 1: Lint and Build (shared by all test jobs)
  # ============================================
  lint-and-build:
    runs-on: ubuntu-latest
    # security-events: write lets the OSV report-only tier (Story 13-32 AC2)
    # upload SARIF to the GitHub Security tab. contents: read covers checkout /
    # build / artifact upload. Scoped explicitly (mirrors the lighthouse job).
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # Needed for change detection

      # SHA-pinned to a Node 24 commit on main. The v4 stable tag still declares
      # `using: node20` in its action.yml as of 2026-05-01. Re-evaluate to a tagged
      # release when pnpm/action-setup publishes a Node 24 stable (likely v6.x line).
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a
        with:
          # Pin pnpm to a Node 20-compatible version. The action's default
          # behavior (no `version:`) installs the LATEST pnpm, which started
          # requiring Node.js 22.13+ in pnpm 10.x (released ~early 2025). Our
          # CI uses Node 20, so the default install fails with
          # `ERR_UNKNOWN_BUILTIN_MODULE: No such built-in module: node:sqlite`.
          # 9.15.0 matches `packageManager` in root package.json. Bump in
          # lockstep with `packageManager` if/when the workspace upgrades pnpm.
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      # Optimization 1: Turbo Remote Cache (GitHub Actions)
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      # ── Security audit (OSV) — TWO-TIER gate (Story 13-32) ────────────────
      # Story 13-31 adopted osv-scanner (npm retired the legacy `pnpm audit`
      # endpoint — 410 Gone) but osv-scanner has no `--prod` mode: it scans the
      # WHOLE lockfile, surfacing the dev/build/test tree the retired
      # `pnpm audit --prod` gate correctly excluded. 13-31 grandfathered 17 such
      # findings with a 2026-08-15 expiry. 13-32 replaces that with:
      #
      #   Tier 1 — BLOCKING, PRODUCTION scope. Reproduces `pnpm audit --prod`:
      #     scan the full lockfile to JSON, then keep only findings whose package
      #     is in pnpm's production closure (`pnpm ls -r --prod`) and fail iff a
      #     PROD dependency is vulnerable. Dev-tree findings never block. The
      #     scanned set == the real prod set by construction (osv-scanner.toml is
      #     NOT consulted here). Gate logic: apps/api/src/lib/osv-prod-gate.ts
      #     (unit-tested in the test-api job).
      #   Tier 2 — REPORT-ONLY, non-blocking. Full-tree scan → SARIF → Security
      #     tab + artifact, so a compromised BUILD tool is still surfaced (AC2).
      #     osv-scanner.toml filters the permanently-accepted dev-only risks
      #     (xlsx / serialize-javascript / phin) so the report stays actionable.
      #
      # Image pinned by digest (v2.3.8). Repro locally: see osv-scanner.toml header.
      - name: Security audit — production scope (BLOCKING gate)
        run: |
          pnpm ls -r --prod --depth Infinity --json > osv-prod-ls.json
          docker run --rm -v "$PWD:/src" -w /src \
            ghcr.io/google/osv-scanner-action@sha256:48406c58197201fe55e56615ad9d414f85063da320e204d0b0ed460fb3908dba \
            --format=json --lockfile=pnpm-lock.yaml --output-file=osv-full.json || true
          pnpm --filter @oslsr/api exec tsx scripts/osv-prod-gate.ts "$PWD/osv-prod-ls.json" "$PWD/osv-full.json"

      - name: Security audit — full-tree report (non-blocking → SARIF)
        if: always()
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            ghcr.io/google/osv-scanner-action@sha256:48406c58197201fe55e56615ad9d414f85063da320e204d0b0ed460fb3908dba \
            --config=osv-scanner.toml --format=sarif --lockfile=pnpm-lock.yaml --output-file=osv-full.sarif || true

      # Best-effort: only lands in the Security tab if code scanning is enabled
      # on the repo. Never blocks (continue-on-error); the artifact below is the
      # always-available fallback.
      - name: Upload OSV SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@fbcef3fba75224ed6476919775448de80b23cb15 # v3.32.0
        with:
          sarif_file: osv-full.sarif
          category: osv-scanner-full-tree

      - name: Upload OSV dependency report (JSON + SARIF)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: osv-dependency-report
          path: |
            osv-full.json
            osv-full.sarif
          retention-days: 30

      - name: Lint
        run: pnpm lint

      # All VITE_* vars are baked into apps/web/dist at build time.
      # - VITE_API_URL=/api/v1: relative URL so XHR + WS resolve against whichever
      #   domain the page loaded from (Phase 2 dual-domain Strategy A). Hardcoded.
      # - VITE_HCAPTCHA_SITE_KEY: public client-side key. Read from a GH Actions repo
      #   variable. Without it the build falls back to the hCaptcha public test key
      #   (login captcha shows "for testing" banner + POST verify always fails).
      #   Previously picked up by Vite from the VPS-side `.env` during the VPS-side
      #   build — now that the build runs on the cloud runner, it's injected here.
      #   (VITE_GOOGLE_CLIENT_ID removed 2026-06-09: Google OAuth retired in Story
      #   9-12; GCP client revoked + GH variable deleted.)
      #
      # 2026-05-04: vars-vs-secrets ambiguity caught in production after the values
      # were stored as Secrets (where they're invisible to `vars.X` template lookup)
      # while the workflow expected Variables. Result: empty bake → hCaptcha test
      # widget on the live site → 35-min login outage (11:11→11:46 UTC). The guard
      # below catches this class of regression at minute 1 of CI rather than after
      # deploy. Failure modes covered:
      #   1. Variable missing entirely (typo in workflow OR variable deleted from repo)
      #   2. Variable set but value is the public hCaptcha test key (operator pasted
      #      the example value from docs by mistake)
      # Pitfall #23 in docs/infrastructure-cicd-playbook.md has the full diagnostic.
      - name: Pre-build env guard (Pitfall #23 — vars-vs-secrets / test-key fallback)
        env:
          VITE_HCAPTCHA_SITE_KEY: ${{ vars.VITE_HCAPTCHA_SITE_KEY }}
        run: |
          if [ -z "$VITE_HCAPTCHA_SITE_KEY" ]; then
            echo "::error::VITE_HCAPTCHA_SITE_KEY is empty. Likely cause: stored as a GH Actions Secret instead of Variable. Set via 'gh variable set VITE_HCAPTCHA_SITE_KEY --body \"<value>\" --repo awwallawal/oslrs' OR add via Settings → Secrets and variables → Actions → Variables tab. Pitfall #23 in docs/infrastructure-cicd-playbook.md."
            exit 1
          fi
          if [ "$VITE_HCAPTCHA_SITE_KEY" = "10000000-ffff-ffff-ffff-000000000001" ]; then
            echo "::error::VITE_HCAPTCHA_SITE_KEY is set to the hCaptcha PUBLIC TEST KEY (10000000-ffff-...). The live site would render the 'for testing purposes only' widget and login POSTs would fail because the server holds the prod secret. Set the real prod sitekey via 'gh variable set'."
            exit 1
          fi
          echo "✅ VITE_* env guard passed: hCaptcha sitekey set + non-test."
      - name: Build
        env:
          VITE_API_URL: /api/v1
          VITE_HCAPTCHA_SITE_KEY: ${{ vars.VITE_HCAPTCHA_SITE_KEY }}
        run: pnpm build

      # Upload build artifacts for parallel test jobs
      - name: Upload build artifacts
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: build-artifacts
          path: |
            apps/*/dist
            packages/*/dist
            services/*/dist
            .turbo
          retention-days: 1

  # ============================================
  # Job 2: Fast Unit Tests (no services needed)
  # Optimization 4: Fast tests run first
  # ============================================
  test-unit:
    needs: lint-and-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Optimization 2: Parallel matrix - fast packages
        package: [utils, testing]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # SHA-pinned to a Node 24 commit on main. The v4 stable tag still declares
      # `using: node20` in its action.yml as of 2026-05-01. Re-evaluate to a tagged
      # release when pnpm/action-setup publishes a Node 24 stable (likely v6.x line).
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a
        with:
          # Pin pnpm to a Node 20-compatible version. The action's default
          # behavior (no `version:`) installs the LATEST pnpm, which started
          # requiring Node.js 22.13+ in pnpm 10.x (released ~early 2025). Our
          # CI uses Node 20, so the default install fails with
          # `ERR_UNKNOWN_BUILTIN_MODULE: No such built-in module: node:sqlite`.
          # 9.15.0 matches `packageManager` in root package.json. Bump in
          # lockstep with `packageManager` if/when the workspace upgrades pnpm.
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Download build artifacts
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: build-artifacts
          path: .

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Optimization 3: Skip unchanged packages on PRs
      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Only test if this package or its dependencies changed
            CHANGED=$(pnpm turbo run test --filter=@oslsr/${{ matrix.package }}...[origin/${{ github.base_ref }}] --dry-run=json 2>/dev/null | jq '.packages | length' 2>/dev/null || echo 1)
            if [ "$CHANGED" -gt 0 ]; then
              echo "Changes detected, running tests..."
              pnpm --filter @oslsr/${{ matrix.package }} test
            else
              echo "No changes in ${{ matrix.package }}, skipping tests"
            fi
          else
            pnpm --filter @oslsr/${{ matrix.package }} test
          fi

      - name: Debug - List test result files
        if: always()
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Config marker file (proves config loaded) ==="
          cat .vitest-config-loaded 2>/dev/null || echo "NO MARKER FILE - CONFIG NOT LOADED!"
          echo "=== All .vitest-live files in repo ==="
          find . -name ".vitest-live*.json" -type f 2>/dev/null || echo "None found"
          echo "=== Reporter trace log ==="
          cat reporter-trace.log 2>/dev/null || echo "No trace log"
          echo "=== Files in current dir ==="
          ls -la .vitest-live*.json 2>/dev/null || echo "No .vitest-live files in current dir"

      - name: Upload test results
        if: always()
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-results-${{ matrix.package }}
          path: |
            .vitest-live-*.json
            .vitest-config-loaded
            reporter-trace.log
            packages/${{ matrix.package }}/vitest-report.json
            services/${{ matrix.package }}/vitest-report.json
          retention-days: 1
          if-no-files-found: warn

  # ============================================
  # Job 3: API Tests (needs Postgres + Redis)
  # ============================================
  test-api:
    needs: lint-and-build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      REFRESH_TOKEN_SECRET: test-refresh-token-secret-for-ci
      PUBLIC_APP_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # SHA-pinned to a Node 24 commit on main. The v4 stable tag still declares
      # `using: node20` in its action.yml as of 2026-05-01. Re-evaluate to a tagged
      # release when pnpm/action-setup publishes a Node 24 stable (likely v6.x line).
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a
        with:
          # Pin pnpm to a Node 20-compatible version. The action's default
          # behavior (no `version:`) installs the LATEST pnpm, which started
          # requiring Node.js 22.13+ in pnpm 10.x (released ~early 2025). Our
          # CI uses Node 20, so the default install fails with
          # `ERR_UNKNOWN_BUILTIN_MODULE: No such built-in module: node:sqlite`.
          # 9.15.0 matches `packageManager` in root package.json. Bump in
          # lockstep with `packageManager` if/when the workspace upgrades pnpm.
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Download build artifacts
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: build-artifacts
          path: .

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Database
        # M5 (code-review 2026-05-03): use db:push:full:force so the test-api
        # job applies BOTH the Drizzle schema AND every migrate-*-init.ts
        # runner. Previously this step ran `db:push:force` only, which left
        # the test DB without the raw-SQL constraints (chk_respondents_phone_
        # number_e164, respondents_status_check, respondents_nin_unique_when_
        # present, import_batches_status_check). DB-constraint tests
        # (apps/api/src/db/schema/__tests__/respondents.constraints.test.ts)
        # silently failed in CI even when passing locally because the
        # constraints didn't exist for them to validate. Closes the local-vs-CI
        # parity gap. See playbook Pitfall #28 (the local-dev counterpart).
        run: pnpm --filter @oslsr/api db:push:full:force

      # Optimization 3: Skip unchanged packages on PRs
      - name: Run API tests
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(pnpm turbo run test --filter=@oslsr/api...[origin/${{ github.base_ref }}] --dry-run=json 2>/dev/null | jq '.packages | length' 2>/dev/null || echo 1)
            if [ "$CHANGED" -gt 0 ]; then
              echo "Changes detected, running API tests..."
              pnpm --filter @oslsr/api test
            else
              echo "No changes in API, skipping tests"
            fi
          else
            pnpm --filter @oslsr/api test
          fi

      - name: Debug - List test result files
        if: always()
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Config marker file (proves config loaded) ==="
          cat .vitest-config-loaded 2>/dev/null || echo "NO MARKER FILE - CONFIG NOT LOADED!"
          echo "=== All .vitest-live files in repo ==="
          find . -name ".vitest-live*.json" -type f 2>/dev/null || echo "None found"
          echo "=== Reporter trace log ==="
          cat reporter-trace.log 2>/dev/null || echo "No trace log"
          echo "=== Files in current dir ==="
          ls -la .vitest-live*.json 2>/dev/null || echo "No .vitest-live files in current dir"

      - name: Upload test results
        if: always()
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-results-api
          path: |
            .vitest-live-*.json
            .vitest-config-loaded
            reporter-trace.log
            apps/api/vitest-report.json
          retention-days: 1
          if-no-files-found: warn

  # ============================================
  # Auth refresh-token lifecycle smoke (Story 9-42 close-out)
  # Black-box HTTP check of F-022 rotation + reuse-detection + F-012 logout
  # against a real running API. `deploy` needs this job → it is a HARD pre-deploy
  # gate, closing the "E2E doesn't gate deploy" gap for the auth/refresh flow.
  # Permanent regression gate for Stories 9-48 (rotation grace / OPS-3 hash-at-rest)
  # and 9-49 (boot silent-refresh). Runner: scripts/uat-refresh-rotation-smoke.ts.
  # ============================================
  auth-smoke:
    needs: lint-and-build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # NODE_ENV=development makes captcha.ts skip hCaptcha so the seeded account
      # can log in headlessly (same as e2e.yml).
      NODE_ENV: development
      DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      REFRESH_TOKEN_SECRET: test-refresh-token-secret-for-ci
      PUBLIC_APP_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Push database schema
        run: pnpm --filter @oslsr/api db:push:force

      - name: Seed dev accounts
        run: pnpm --filter @oslsr/api db:seed:dev

      - name: Start API server (background)
        run: pnpm --filter @oslsr/api dev > /tmp/api.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health >/dev/null; then echo "API healthy"; exit 0; fi
            sleep 2
          done
          echo "API did not become healthy in 120s"; cat /tmp/api.log || true; exit 1

      - name: Refresh-rotation smoke (F-022 rotation + reuse + F-012 logout)
        run: >-
          pnpm exec tsx scripts/uat-refresh-rotation-smoke.ts
          --base-url=http://localhost:3000
          --login --login-path=/auth/staff/login
          --email=enumerator@dev.local --password=enum123

      - name: API log on failure
        if: failure()
        run: cat /tmp/api.log || true

  # ============================================
  # Job 3b: Smoke E2E (Playwright) — gates deploy (Story 9-62 E)
  # ============================================
  smoke-e2e:
    needs: lint-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Story 9-62 (E): the fast, stable `smoke` Playwright project (homepage /
    # login / public-nav) GATES the deploy. The FULL e2e suite stays in e2e.yml
    # (non-blocking) because the 9-21 /register route-resolution case is
    # timing-sensitive on a shared runner — gating the whole suite would block
    # deploys on a known flake. A red smoke now blocks deploy; a red full-suite
    # still only reports. Closes the gap where the 9-39 stale login smoke shipped
    # to prod un-noticed (e2e.yml ran parallel to — not as a dependency of — deploy).
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # NODE_ENV=development makes captcha.ts skip hCaptcha so headless renders
      # work (same as e2e.yml). test_db also satisfies the 9-62 (D) test-DB guard.
      NODE_ENV: development
      DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      REFRESH_TOKEN_SECRET: test-refresh-token-secret-for-ci
      PUBLIC_APP_URL: http://localhost:5173
      VITE_E2E: 'true'
      E2E: 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a
        with:
          version: 9.15.0
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build
      - name: Push database schema
        run: pnpm --filter @oslsr/api db:push:force
      - name: Seed database
        run: pnpm --filter @oslsr/api db:seed:dev
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-v2-${{ hashFiles('apps/web/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-v2-
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @oslsr/web exec playwright install chromium --with-deps
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @oslsr/web exec playwright install-deps chromium
      - name: Run smoke E2E (gates deploy)
        run: pnpm --filter @oslsr/web exec playwright test --project=smoke
        env:
          CI: true
      - name: Upload smoke report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: smoke-e2e-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ============================================
  # Job 4: Web Tests (no services, but larger)
  # ============================================
  test-web:
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # SHA-pinned to a Node 24 commit on main. The v4 stable tag still declares
      # `using: node20` in its action.yml as of 2026-05-01. Re-evaluate to a tagged
      # release when pnpm/action-setup publishes a Node 24 stable (likely v6.x line).
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a
        with:
          # Pin pnpm to a Node 20-compatible version. The action's default
          # behavior (no `version:`) installs the LATEST pnpm, which started
          # requiring Node.js 22.13+ in pnpm 10.x (released ~early 2025). Our
          # CI uses Node 20, so the default install fails with
          # `ERR_UNKNOWN_BUILTIN_MODULE: No such built-in module: node:sqlite`.
          # 9.15.0 matches `packageManager` in root package.json. Bump in
          # lockstep with `packageManager` if/when the workspace upgrades pnpm.
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Download build artifacts
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: build-artifacts
          path: .

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Optimization 3: Skip unchanged packages on PRs
      - name: Run Web tests
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(pnpm turbo run test --filter=@oslsr/web...[origin/${{ github.base_ref }}] --dry-run=json 2>/dev/null | jq '.packages | length' 2>/dev/null || echo 1)
            if [ "$CHANGED" -gt 0 ]; then
              echo "Changes detected, running Web tests..."
              pnpm --filter @oslsr/web test
            else
              echo "No changes in Web, skipping tests"
            fi
          else
            pnpm --filter @oslsr/web test
          fi

      - name: Debug - List test result files
        if: always()
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Config marker file (proves config loaded) ==="
          cat .vitest-config-loaded 2>/dev/null || echo "NO MARKER FILE - CONFIG NOT LOADED!"
          echo "=== All .vitest-live files in repo ==="
          find . -name ".vitest-live*.json" -type f 2>/dev/null || echo "None found"
          echo "=== Reporter trace log ==="
          cat reporter-trace.log 2>/dev/null || echo "No trace log"
          echo "=== Files in current dir ==="
          ls -la .vitest-live*.json 2>/dev/null || echo "No .vitest-live files in current dir"

      - name: Upload test results
        if: always()
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-results-web
          path: |
            .vitest-live-*.json
            .vitest-config-loaded
            reporter-trace.log
            apps/web/vitest-report.json
          retention-days: 1
          if-no-files-found: warn

  # ============================================
  # E2E Tests moved to separate workflow (.github/workflows/e2e.yml)
  # to avoid blocking the main CI green check.
  # ============================================

  # ============================================
  # Job 6: Generate Dashboard (merge all results)
  # ============================================
  dashboard:
    needs: [test-unit, test-api, test-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # SHA-pinned to a Node 24 commit on main. The v4 stable tag still declares
      # `using: node20` in its action.yml as of 2026-05-01. Re-evaluate to a tagged
      # release when pnpm/action-setup publishes a Node 24 stable (likely v6.x line).
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a
        with:
          # Pin pnpm to a Node 20-compatible version. The action's default
          # behavior (no `version:`) installs the LATEST pnpm, which started
          # requiring Node.js 22.13+ in pnpm 10.x (released ~early 2025). Our
          # CI uses Node 20, so the default install fails with
          # `ERR_UNKNOWN_BUILTIN_MODULE: No such built-in module: node:sqlite`.
          # 9.15.0 matches `packageManager` in root package.json. Bump in
          # lockstep with `packageManager` if/when the workspace upgrades pnpm.
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Download all test results
      - name: Download test results (utils)
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: test-results-utils
          path: .
        continue-on-error: true

      - name: Download test results (testing)
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: test-results-testing
          path: .
        continue-on-error: true

      - name: Download test results (api)
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: test-results-api
          path: .
        continue-on-error: true

      - name: Download test results (web)
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: test-results-web
          path: .
        continue-on-error: true

      - name: Generate Test Dashboard
        run: pnpm test:dashboard

      - name: Upload Test Dashboard
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-dashboard
          path: |
            test-pipeline.html
            .vitest-live.json
          retention-days: 30

      - name: Generate Test Summary
        run: |
          if [ -f ".vitest-live.json" ]; then
            echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            node -e "
              const data = require('./.vitest-live.json');
              const tests = data.tests || [];
              const total = tests.length;
              const passed = tests.filter(t => t.status === 'passed').length;
              const failed = tests.filter(t => t.status === 'failed').length;
              const skipped = tests.filter(t => t.status === 'skipped').length;

              // Group by package
              const byPkg = {};
              tests.forEach(t => {
                const pkg = t.package || 'unknown';
                byPkg[pkg] = byPkg[pkg] || { passed: 0, failed: 0 };
                if (t.status === 'passed') byPkg[pkg].passed++;
                if (t.status === 'failed') byPkg[pkg].failed++;
              });

              console.log('| Status | Count |');
              console.log('|--------|-------|');
              console.log('| Total | ' + total + ' |');
              console.log('| ✅ Passed | ' + passed + ' |');
              console.log('| ❌ Failed | ' + failed + ' |');
              console.log('| ⏭️ Skipped | ' + skipped + ' |');

              console.log('');
              console.log('### By Package');
              console.log('| Package | Passed | Failed |');
              console.log('|---------|--------|--------|');
              Object.entries(byPkg).sort((a,b) => b[1].passed - a[1].passed).forEach(([pkg, stats]) => {
                const status = stats.failed > 0 ? '❌' : '✅';
                console.log('| ' + status + ' ' + pkg + ' | ' + stats.passed + ' | ' + stats.failed + ' |');
              });

              if (failed > 0) {
                console.log('');
                console.log('### Failed Tests');
                console.log('');
                tests.filter(t => t.status === 'failed').forEach(t => {
                  console.log('- **' + t.name + '** (' + (t.package || 'unknown') + ')');
                  if (t.error) console.log('  - Error: \`' + t.error.substring(0, 100) + '\`');
                });
              }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
          fi

      # Fail the job if any tests failed
      - name: Check for failures
        run: |
          if [ -f ".vitest-live.json" ]; then
            FAILED=$(node -e "const d = require('./.vitest-live.json'); console.log(d.tests.filter(t => t.status === 'failed').length)")
            if [ "$FAILED" -gt 0 ]; then
              echo "❌ $FAILED tests failed"
              exit 1
            fi
            echo "✅ All tests passed"
          fi

  # ============================================
  # Job 6: Lighthouse Performance Audit
  # Runs on both push and PRs for performance monitoring
  # ============================================
  lighthouse:
    needs: lint-and-build
    runs-on: ubuntu-latest
    # PR-event runs need explicit pull-requests:write to post the Lighthouse
    # score comment via actions/github-script. Without this, GITHUB_TOKEN gets
    # repo-level read-only and the comment-create call returns 403
    # "Resource not accessible by integration" (Story 9-15 PR #1 first exposure).
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      # SHA-pinned to a Node 24 commit on main. The v4 stable tag still declares
      # `using: node20` in its action.yml as of 2026-05-01. Re-evaluate to a tagged
      # release when pnpm/action-setup publishes a Node 24 stable (likely v6.x line).
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a
        with:
          # Pin pnpm to a Node 20-compatible version. The action's default
          # behavior (no `version:`) installs the LATEST pnpm, which started
          # requiring Node.js 22.13+ in pnpm 10.x (released ~early 2025). Our
          # CI uses Node 20, so the default install fails with
          # `ERR_UNKNOWN_BUILTIN_MODULE: No such built-in module: node:sqlite`.
          # 9.15.0 matches `packageManager` in root package.json. Bump in
          # lockstep with `packageManager` if/when the workspace upgrades pnpm.
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Download build artifacts
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: build-artifacts
          path: .

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web App
        run: pnpm --filter @oslsr/web build

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./apps/web/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Format Lighthouse Score
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));

            const formatScore = (score) => {
              if (score >= 0.9) return `🟢 ${Math.round(score * 100)}`;
              if (score >= 0.5) return `🟠 ${Math.round(score * 100)}`;
              return `🔴 ${Math.round(score * 100)}`;
            };

            let report = '## ⚡ Lighthouse Report\n\n';
            report += '| Category | Score |\n';
            report += '|----------|-------|\n';

            for (const result of results) {
              const summary = JSON.parse(fs.readFileSync(result.jsonPath, 'utf8'));
              const categories = summary.categories;

              report += `| Performance | ${formatScore(categories.performance.score)} |\n`;
              report += `| Accessibility | ${formatScore(categories.accessibility.score)} |\n`;
              report += `| Best Practices | ${formatScore(categories['best-practices'].score)} |\n`;
              report += `| SEO | ${formatScore(categories.seo.score)} |\n`;

              // Add LCP warning if needed
              const lcp = summary.audits['largest-contentful-paint'];
              if (lcp && lcp.numericValue > 2500) {
                report += `\n⚠️ **LCP Warning**: ${Math.round(lcp.numericValue)}ms (target: <2500ms)\n`;
              }
            }

            report += '\n📊 [View full report](https://storage.googleapis.com/lighthouse-infrastructure.appspot.com/reports/' + results[0].url + ')';

            // Always write to job summary (visible in Actions tab)
            await core.summary.addRaw(report).write();

            // Post comment only on PRs
            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

  # ============================================
  # Job 7: Deploy (only on main, after tests pass)
  # ============================================
  deploy:
    # auth-smoke gates deploy (Story 9-42 close-out): a broken refresh-token
    # rotation / reuse-detection / logout flow blocks the deploy.
    # smoke-e2e gates deploy (Story 9-62 E): a broken critical-path smoke
    # (homepage / login / public-nav) blocks the deploy; full e2e stays non-blocking.
    needs: [dashboard, auth-smoke, smoke-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Download the build artifact produced by lint-and-build (cloud runner).
      # The artifact contains apps/*/dist + packages/*/dist + services/*/dist + .turbo.
      # We only ship apps/web/dist to the VPS (next step) — the build was already
      # done on the runner, so the VPS no longer needs to run vite+tsc itself.
      - name: Download build artifacts
        # SHA-pinned to a Node 24 commit on main. The v5 stable tag still declares
        # `using: node20` as of 2026-05-01. Re-bump to a tagged Node 24 release
        # when one ships (likely v6.x).
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: build-artifacts
          path: ./build-artifacts/

      # SCP web dist to VPS using a SHA-namespaced temp dir so concurrent or
      # retried deploys never collide. strip_components: 4 strips
      # build-artifacts/apps/web/dist/ from the path so files land directly under
      # /tmp/oslrs-web-dist-<sha>/index.html, /assets/, etc.
      - name: SCP web dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build-artifacts/apps/web/dist/*"
          target: "/tmp/oslrs-web-dist-${{ github.sha }}"
          strip_components: 4

      - name: Pre-deploy env var safety check
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/oslrs
            trap 'rm -f /tmp/oslrs-check-env.sh /tmp/oslrs-app.ts' EXIT
            git fetch origin main

            # Use latest check script and app.ts from incoming code (before git pull)
            git show origin/main:scripts/check-env.sh > /tmp/oslrs-check-env.sh
            git show origin/main:apps/api/src/app.ts > /tmp/oslrs-app.ts

            bash /tmp/oslrs-check-env.sh --env-file .env --app-ts /tmp/oslrs-app.ts

      - name: Deploy to DigitalOcean VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eo pipefail
            # H1 fix: trap-cleanup the SHA-namespaced temp dir on ANY exit path
            # (success, error, or unexpected interrupt). Without this, a failure in
            # git pull / pnpm install / db:push / migrate-audit leaves the temp dir
            # orphaned on /tmp until manual cleanup. With github.sha namespacing,
            # leaks would accumulate over time. trap is idempotent — runs once on EXIT.
            trap 'sudo rm -rf /tmp/oslrs-web-dist-${{ github.sha }} || true' EXIT
            cd ~/oslrs

            # Wave-0 close-out measurement block (start). Captures pre-deploy resource
            # baseline so AC#7-AC#10 can be verified from GH Actions logs without
            # live-SSH-during-deploy stopwatch toil. Permanent in deploy script —
            # provides free regression monitoring on every future deploy.
            echo "=== WAVE-0-MEASUREMENT START sha=${{ github.sha }} ==="
            date -u +%FT%TZ
            top -bn1 | head -5
            free -h | head -3
            DEPLOY_START=$(date +%s)

            git pull origin main

            # Install dependencies if package.json changed.
            # Kept on VPS because the API runs via `pnpm tsx` at runtime and
            # tsx resolves modules through node_modules/. Future option: bundle
            # the API into a single file via tsup/esbuild and drop pnpm install.
            pnpm install --frozen-lockfile

            # Push any schema changes to production DB
            pnpm --filter @oslsr/api db:push

            # Run idempotent migration scripts (safe to re-run on every deploy)
            cd apps/api && pnpm tsx scripts/migrate-audit-immutable.ts && cd ~/oslrs

            # Story 9-13 MFA init: partial index + grace_until seed for super_admins
            cd apps/api && pnpm tsx scripts/migrate-mfa-init.ts && cd ~/oslrs

            # Story 9-13 deploy-time email: REMOVED from every-deploy firing 2026-05-19
            # after operator received 3 reminder emails in 90 min from 3 unrelated
            # deploys today. The original wiring (Story 9-13 F3 code-review fix)
            # lacked idempotency — every CI deploy re-emailed every super_admin in
            # grace. Now invoke this script ONLY as an operator-gated one-shot from
            # SSH when a fresh super_admin needs the grace notification:
            #   ssh root@oslsr-home-app
            #   cd /root/oslrs && pnpm --filter @oslsr/api exec tsx scripts/notify-mfa-grace.ts
            # Long-term: Story 9-13 follow-up to add a `last_mfa_reminder_sent_at`
            # idempotency column + only re-fire after >7 days OR <72h to grace expiry.
            # cd apps/api && pnpm tsx scripts/notify-mfa-grace.ts || true && cd ~/oslrs

            # prep-input-sanitisation-layer: applies the chk_respondents_phone_number_e164
            # NOT VALID constraint that Drizzle's db:push cannot express. Idempotent.
            # Back-fill script is operator-gated (NOT auto-run from deploy) — see
            # docs/active-watches.md for the operator runbook entry.
            cd apps/api && pnpm tsx scripts/migrate-input-sanitisation-init.ts && cd ~/oslrs

            # Story 11-1 multi-source registry: applies respondents_status_check + the
            # partial unique index respondents_nin_unique_when_present that Drizzle's
            # db:push cannot express. Also drops the legacy inline NIN UNIQUE constraint
            # if db:push left it behind. Idempotent.
            cd apps/api && pnpm tsx scripts/migrate-multi-source-registry-init.ts && cd ~/oslrs

            # Story 9-11 schema down payment: applies audit_logs_principal_exclusive_check
            # (Decision 5.4 audit-log principal dualism) + api_consumers_status_check +
            # api_consumers_organisation_type_check. Drizzle 0.45 cannot express CHECK
            # constraints inline; this runner closes the gap. Idempotent. Also lays down
            # the api_consumers table that Story 10-1 (Consumer Authentication Layer)
            # will own the auth surface for — schema-ahead split per ADR-019.
            cd apps/api && pnpm tsx scripts/migrate-audit-principal-dualism-init.ts && cd ~/oslrs

            # prep-settings-landing-and-feature-flags: seeds the auth.sms_otp_enabled
            # row into system_settings (Drizzle's db:push creates the table but cannot
            # seed). Idempotent (ON CONFLICT DO NOTHING). Defensive: aborts cleanly if
            # zero active super_admin rows exist (FK target).
            cd apps/api && pnpm tsx scripts/migrate-system-settings-init.ts && cd ~/oslrs

            # Story 9-56: registry search-at-scale indexes — expression index on
            # lower(raw_data->>'email') + GIN trigram indexes on respondents
            # first_name/last_name/phone_number/nin. Drizzle 0.45 cannot express
            # expression/GIN indexes inline. Powers the two-phase registry search
            # (resolve ids via indexed predicates → main query filters r.id = ANY).
            # Idempotent; degrades gracefully if pg_trgm unavailable.
            cd apps/api && pnpm tsx scripts/migrate-registry-search-indexes-init.ts && cd ~/oslrs

            # Story 9-58: reference-code UNIQUE index. Drizzle/db:push creates the
            # respondents.reference_code column; this runner adds the UNIQUE index
            # that backs collision-retry generation + the public status check /
            # 9-56 staff search exact-match lookup. Idempotent (IF NOT EXISTS).
            cd apps/api && pnpm tsx scripts/migrate-reference-code-init.ts && cd ~/oslrs

            # Story 9-38: respondents.user_id FK (ON DELETE SET NULL) + index.
            # Drizzle/db:push creates the column + can express the reference, but
            # the runner converges the FK constraint + lookup index idempotently
            # regardless of db:push ordering / partial prior deploy. Links a
            # wizard respondent to the passwordless public_user provisioned at
            # submit, so magic-link login (9-16) is reachable for new registrants.
            cd apps/api && pnpm tsx scripts/migrate-respondents-user-id-init.ts && cd ~/oslrs

            # Story 9-41 AC#6: contact_reveals.purpose + tos_accepted_at columns.
            # Drizzle/db:push adds the columns; this runner converges them
            # idempotently (ADD COLUMN IF NOT EXISTS) so the purpose-binding audit
            # enrichment is present regardless of db:push ordering / partial prior
            # deploy. Both columns are NULLABLE (below-threshold reveals stay NULL).
            cd apps/api && pnpm tsx scripts/migrate-reveal-purpose-init.ts && cd ~/oslrs

            # Story 13-33: registry_unified VIEW. The canonical respondent-anchored
            # unified read (public insights headline + breakdowns + density, count-
            # core, and 12-4 post-launch) is created from the SAME SQL the runtime
            # service composes inline (registry-unified.sql.ts), so the view and the
            # app can't drift. CREATE OR REPLACE (DROP-first) — idempotent, no
            # dependents. The app reads inline (belt), so a missing view never 500s;
            # this view is the analyst/BI/12-4 "one table" + the parity-test target.
            cd apps/api && pnpm tsx scripts/migrate-registry-unified-view-init.ts && cd ~/oslrs

            # Story 11-2: extend respondents_status_check to permit `rolled_back`
            # (the import 14-day rollback soft-delete status). Drizzle db:push adds
            # the enum value at the TS layer but does NOT touch the Postgres CHECK
            # that Story 11-1's runner installed with only 4 values; without this a
            # rollback write would be rejected. Idempotent (only drops+recreates the
            # constraint when the live def lacks rolled_back). Must run AFTER
            # migrate-multi-source-registry-init.ts (which creates the constraint).
            cd apps/api && pnpm tsx scripts/migrate-import-service-init.ts && cd ~/oslrs

            # M3 fix: backup-before-overwrite for /var/www/oslsr — gives one-step
            # rollback (`mv /var/www/oslsr.bak.prev /var/www/oslsr`) if a future
            # build ships corrupt dist. Mirrors the nginx backup-test-restore pattern
            # already in use below. Only retains the IMMEDIATELY-prior dist (one
            # generation), not full history — disk-bounded.
            sudo rm -rf /var/www/oslsr.bak.prev || true
            sudo mv /var/www/oslsr /var/www/oslsr.bak.prev
            sudo mkdir -p /var/www/oslsr

            # Frontend dist comes from CI artifact (Wave 0 prep-build-off-vps-cloud-runner).
            # lint-and-build job runs `pnpm build` with VITE_API_URL=/api/v1, then
            # actions/upload-artifact ships build-artifacts; this deploy job downloads
            # it and scp-action lands it under /tmp/oslrs-web-dist-<sha>/.
            # The 2GB VPS no longer runs vite+tsc, eliminating the deploy-time CPU/memory
            # spike that triggered CRITICAL system-health digests.
            sudo cp -r /tmp/oslrs-web-dist-${{ github.sha }}/* /var/www/oslsr/

            # H2 fix: fail-fast if dist copy is empty/broken. Without this, a future
            # scp-action path/glob misconfig (or zero-file artifact) would silently
            # serve a 404-page-only /var/www/oslsr while pm2 restart still runs. The
            # M3 backup at /var/www/oslsr.bak.prev gives the operator a one-step
            # restore path when this guard trips.
            [[ -f /var/www/oslsr/index.html ]] || { echo "::error::dist copy missing index.html — restore via 'sudo mv /var/www/oslsr.bak.prev /var/www/oslsr'"; exit 1; }

            # Deploy nginx config (Story 9-7 — security headers + TLS hardening).
            # Strategy: backup → copy → test → reload. If test fails, restore backup
            # so the prior good config stays on disk even for cold reloads (certbot
            # renewal, reboots, etc.). set -eo pipefail above ensures the deploy
            # step fails loudly if any of these fail, instead of silently proceeding
            # to pm2 restart while leaving nginx broken.
            sudo cp /etc/nginx/sites-available/oslsr /etc/nginx/sites-available/oslsr.bak
            sudo cp infra/nginx/oslsr.conf /etc/nginx/sites-available/oslsr
            if sudo nginx -t; then
              sudo systemctl reload nginx
            else
              echo "::error::nginx -t failed — restoring backup config"
              sudo cp /etc/nginx/sites-available/oslsr.bak /etc/nginx/sites-available/oslsr
              exit 1
            fi

            # Restart API
            pm2 restart oslsr-api

            # Wave-0 close-out measurement block (end). Captures post-deploy resource
            # peak + total wall-clock. Story acceptance: CPU <30%, mem <1Gi peak,
            # wall-clock <4 min, no CRITICAL system-health digest within deploy
            # window. Eyeball from GH Actions logs after each deploy. Block stays
            # in place after Wave 0 close-out for free regression monitoring.
            echo "=== WAVE-0-MEASUREMENT END duration=$(($(date +%s) - DEPLOY_START))s ==="
            date -u +%FT%TZ
            top -bn1 | head -5
            free -h | head -3
