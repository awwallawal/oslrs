# DEVELOPMENT CONTAINER ONLY — NOT USED IN PRODUCTION.
# Production nginx config lives at infra/nginx/oslsr.conf.
# This file only backs docker/Dockerfile.web, which is built by docker/docker-compose.yml
# for local container-stack testing. The real VPS deploy uses host nginx at
# /etc/nginx/sites-available/oslsr (deployed from infra/nginx/oslsr.conf via CI).
# See Story 9-7.
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Hide server version
    server_tokens off;

    # Security Headers (applied to ALL responses including static files)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # Redirect all requests to index.html for React Router
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}
