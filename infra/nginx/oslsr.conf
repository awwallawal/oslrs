# OSLRS production NGINX configuration
# Deployed automatically via .github/workflows/ci-cd.yml to /etc/nginx/sites-available/oslsr
# Source of truth — do NOT edit /etc/nginx/sites-available/oslsr directly on the VPS.
# Story 9-7: security headers + TLS hardening, 2026-04-11.

server {
    listen 80;
    server_name oyotradeministry.com.ng www.oyotradeministry.com.ng;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name oyotradeministry.com.ng www.oyotradeministry.com.ng;

    # SSL
    ssl_certificate /etc/letsencrypt/live/oyotradeministry.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oyotradeministry.com.ng/privkey.pem;

    # TLS hardening — override stock Ubuntu http-block default at server level.
    # Main /etc/nginx/nginx.conf still lists TLSv1 TLSv1.1 — we disable them here
    # without touching the main file (surgical override).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Hide server version (main nginx.conf has server_tokens commented out)
    server_tokens off;

    # Security Headers — applied to ALL static-HTML responses.
    # API responses (/api/*) get their own headers from Express Helmet middleware;
    # the /api and /socket.io location blocks below break this inheritance chain
    # via a dummy add_header so Helmet owns the API/WS header space alone (no duplicates).
    # X-XSS-Protection deliberately "0" — the legacy Chrome/IE auditor is obsolete,
    # browsers ignore it, and OWASP recommends disabling it. CSP is the modern control.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self), payment=(), usb=(), accelerometer=(), autoplay=(), magnetometer=(), gyroscope=(), midi=(), picture-in-picture=()" always;

    # Frontend — serve static React build
    root /var/www/oslsr;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching — 1 year immutable (Vite fingerprints filenames).
    # Any add_header inside a location block disables inheritance of server-level
    # add_header directives, so all 6 security headers must be re-asserted here.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self), payment=(), usb=(), accelerometer=(), autoplay=(), magnetometer=(), gyroscope=(), midi=(), picture-in-picture=()" always;
    }

    # API reverse proxy — Helmet (Express middleware) owns API security headers.
    # The bare add_header below breaks inheritance of server-level headers so we
    # don't emit duplicate HSTS / X-Frame-Options / Referrer-Policy on API responses.
    location /api {
        add_header X-Proxy-Upstream "api" always;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket proxy (Socket.IO real-time notifications).
    # Same inheritance-break pattern as /api — Helmet stamps headers on the upgrade response.
    location /socket.io/ {
        add_header X-Proxy-Upstream "socketio" always;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
